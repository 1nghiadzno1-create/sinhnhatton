<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Slideshow - Music Start at 50s</title>
    <style>
        :root { --blue: #33b5e5; --pink: #f06292; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #000; font-family: 'Arial Black', sans-serif;
        }

        /* MÀN HÌNH ĐẾM NGƯỢC */
        #countdown-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #fff; z-index: 100;
            transition: opacity 1s;
        }
        .timer { font-size: 15vw; font-weight: 900; color: #333; }
        .date { font-size: 20px; color: #2d1a6e; margin-bottom: 20px; }

        /* MÀN HÌNH CHÍNH */
        #birthday-screen {
            display: none; width: 100%; height: 100%;
            background: radial-gradient(circle, #fce4ec, #f8c9d4);
            position: relative; justify-content: center; align-items: center;
        }

        /* KHUNG CHỨA ẢNH */
        .slide {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            animation: fadeInOut 4s forwards;
        }

        .img-box {
            width: 320px; height: 450px;
            border: 15px solid white; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        h1 {
            font-size: 50px; color: var(--blue); text-shadow: 4px 4px var(--pink);
            margin-top: 20px; transform: skewY(-5deg); text-align: center;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); filter: blur(10px); }
            15% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
            85% { opacity: 1; transform: scale(1.05) rotate(0deg); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.3) rotate(10deg); filter: blur(10px); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 50; pointer-events: none; }

        #btn-start {
            position: fixed; z-index: 1000; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 25px 50px; font-size: 24px; background: #ff4757; color: #fff; 
            border: none; cursor: pointer; border-radius: 50px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
        }

        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(0); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <button id="btn-start">BẤM ĐỂ BẮT ĐẦU 🎬</button>

    <audio id="bg-music" src="sinhnhat.mp3" loop></audio>

    <div id="countdown-screen">
        <div class="date" id="date-text">Thứ 6, Ngày 13 Tháng 3, Năm 2026</div>
        <div class="timer" id="time-text">23:59:50</div>
    </div>

    <div id="birthday-screen"></div>

    <canvas id="canvas"></canvas>

    <script>
        const btn = document.getElementById('btn-start');
        const music = document.getElementById('bg-music');
        const timeText = document.getElementById('time-text');
        const dateText = document.getElementById('date-text');
        const screen1 = document.getElementById('countdown-screen');
        const screen2 = document.getElementById('birthday-screen');

        btn.onclick = () => {
            btn.style.display = 'none';
            
            // NHẠC BẮT ĐẦU TỪ GIÂY THỨ 50 CỦA BÀI HÁT
            music.currentTime = 92; 
            music.play();
            
            let seconds = 57; 
            let counter = setInterval(() => {
                seconds++;
                
                if (seconds < 60) {
                    timeText.innerText = `23:59:${seconds}`;
                    if (seconds >= 55) timeText.classList.add('shake');
                } else {
                    clearInterval(counter);
                    timeText.classList.remove('shake');
                    timeText.innerText = "00:00:00";
                    timeText.style.color = "var(--blue)";
                    dateText.innerText = "Thứ Bảy, Ngày 14 Tháng 3, Năm 2026";
                    
                    setTimeout(startSlideshow, 1000);
                }
            }, 1000); 
        };

        function startSlideshow() {
            screen1.style.opacity = '0';
            setTimeout(() => {
                screen1.style.display = 'none';
                screen2.style.display = 'flex';
                showPhotosSequentially(1);
                startConfetti();
            }, 1000);
        }

        function showPhotosSequentially(imgIndex) {
            if (imgIndex > 6) {
                showPhotosSequentially(1);
                return;
            }

            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.style.display = 'flex';
            slide.innerHTML = `
                <img src="sinhnhat${imgIndex}.jpg" class="img-box">
                <h1>HAPPY BIRTHDAY!</h1>
                <p style="color:#fff; font-weight:bold; margin-top:10px; background:rgba(0,0,0,0.4); padding: 5px 15px; border-radius:20px;">
                    Khoảnh khắc thứ ${imgIndex}
                </p>
            `;
            
            screen2.appendChild(slide);

            setTimeout(() => {
                slide.remove();
                showPhotosSequentially(imgIndex + 1);
            }, 4000);
        }

        function startConfetti() {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let pieces = [];
            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    speed: Math.random() * 3 + 2,
                    rotation: Math.random() * 360
                });
            }
            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    p.y += p.speed; p.rotation += 2;
                    if (p.y > canvas.height) p.y = -20;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
